{% set name = "preliz" %}
{% set version = "0.26.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: efb82ea5bfe3390d9746fae43ac429e3c7906edf3446d6c7d1c66181594bfe5f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip >=21.3
    - python {{ python_min }}
    - flit
    - setuptools
  run:
    - arviz-stats >=1.1.0,<2.0.0
    - matplotlib-base >=3.9
    - numba >=0.62
    - numpy >=2.0
    - pytensor-distributions >=0.2.0,<0.3.0
    - python >={{ python_min }}
    - scipy >=1.12
test:
  imports:
    - preliz
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/arviz-devs/preliz
  summary: The place for all your prior elicitation needs.
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://preliz.readthedocs.io/

extra:
  recipe-maintainers:
    - OriolAbril
    - aloctavodia
